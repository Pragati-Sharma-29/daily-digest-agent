<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Digest">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Daily Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e4dc;
      --muted: #6b6560;
      --accent: #c8b89a;
      --accent2: #8fb8a8;
      --serif: 'Instrument Serif', Georgia, serif;
      --mono: 'DM Mono', monospace;
      --radius: 12px;
    }

    html { background: var(--bg); }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: env(safe-area-inset-top, 0) 0 0;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      gap: 12px;
    }

    .logo {
      font-family: var(--serif);
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: -0.01em;
      font-style: italic;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-select {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    .player-bar {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .player-bar.visible { display: flex; }

    .tts-badge {
      font-size: 0.55rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--accent2);
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .player-btn {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.15s;
    }

    .player-btn:active { transform: scale(0.92); }
    .player-btn.playing { background: var(--accent2); }
    .player-btn svg { width: 16px; height: 16px; fill: #0a0a0a; }

    .player-info {
      flex: 1;
      overflow: hidden;
      min-width: 0;
    }

    .player-section {
      font-size: 0.65rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-progress {
      margin-top: 4px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .player-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.5s linear;
    }

    .speed-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .speed-btn:hover { color: var(--text); }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 20px 100px;
    }

    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.8;
    }

    .state-box .icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 12px;
      opacity: 0.4;
    }
