<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Digest">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Daily Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e4dc;
      --muted: #6b6560;
      --accent: #c8b89a;
      --accent2: #8fb8a8;
      --danger: #c87a6a;
      --serif: 'Instrument Serif', Georgia, serif;
      --mono: 'DM Mono', monospace;
      --radius: 12px;
    }

    html { background: var(--bg); }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: env(safe-area-inset-top, 0) 0 0;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      gap: 12px;
    }

    .logo {
      font-family: var(--serif);
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: -0.01em;
      font-style: italic;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Date Selector ── */
    .date-select {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    /* ── Player Bar ── */
    .player-bar {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      display: none;
      align-items: center;
      gap: 12px;
    }

    .player-bar.visible { display: flex; }

    .player-btn {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.15s;
    }

    .player-btn:active { transform: scale(0.92); }
    .player-btn.playing { background: var(--accent2); }

    .player-btn svg { width: 16px; height: 16px; fill: #0a0a0a; }

    .player-info {
      flex: 1;
      overflow: hidden;
    }

    .player-section {
      font-size: 0.65rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-progress {
      margin-top: 4px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .player-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.5s linear;
    }

    .speed-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }

    .speed-btn:hover { color: var(--text); }

    /* ── Main Content ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 20px 100px;
    }

    /* ── Loading / Empty States ── */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.8;
    }

    .state-box .icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    /* ── Digest ── */
    .digest-header {
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .digest-date {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .digest-title {
      font-family: var(--serif);
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      color: var(--text);
      line-height: 1.15;
      font-style: italic;
    }

    .listen-all-btn {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.05em;
    }

    .listen-all-btn:hover { background: rgba(200,184,154,0.08); }
    .listen-all-btn svg { width: 12px; height: 12px; fill: var(--accent); }

    /* ── Sections ── */
    .section {
      margin-bottom: 36px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section:nth-child(1) { animation-delay: 0.05s; }
    .section:nth-child(2) { animation-delay: 0.1s; }
    .section:nth-child(3) { animation-delay: 0.15s; }
    .section:nth-child(4) { animation-delay: 0.2s; }
    .section:nth-child(5) { animation-delay: 0.25s; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
    }

    .section-title {
      font-family: var(--serif);
      font-size: 1.15rem;
      color: var(--accent);
      font-style: italic;
    }

    .section-listen {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--mono);
      font-size: 0.6rem;
      white-space: nowrap;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .section-listen:hover { color: var(--accent2); }
    .section-listen svg { width: 10px; height: 10px; fill: currentColor; }

    /* ── Bullet Points ── */
    .bullets { list-style: none; }

    .bullet {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
      line-height: 1.65;
      color: #c8c4bc;
    }

    .bullet:last-child { border-bottom: none; }

    .bullet-dot {
      color: var(--accent);
      font-size: 0.7rem;
      margin-top: 3px;
      flex-shrink: 0;
    }

    .bullet a {
      color: var(--accent2);
      text-decoration: none;
      font-size: 0.7rem;
      opacity: 0.8;
    }

    .bullet a:hover { opacity: 1; text-decoration: underline; }

    /* ── Top Story ── */
    .top-story {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 36px;
    }

    .top-story-label {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .top-story-text {
      font-size: 0.85rem;
      line-height: 1.7;
      color: var(--text);
    }

    .top-story-text a {
      color: var(--accent2);
      text-decoration: none;
    }

    /* ── Config Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 20px;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 480px;
    }

    .modal h2 {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-style: italic;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .form-group { margin-bottom: 14px; }

    .form-label {
      display: block;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 10px 12px;
      border-radius: 6px;
      outline: none;
    }

    .form-input:focus { border-color: var(--accent); }

    .modal-hint {
      font-size: 0.65rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .modal-hint code {
      background: var(--bg3);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--accent2);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0a;
      border-color: var(--accent);
    }

    .btn:hover { color: var(--text); }
    .btn-primary:hover { opacity: 0.9; }

    /* ── Settings icon ── */
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.15s;
    }

    .icon-btn:hover { color: var(--text); }
    .icon-btn svg { width: 14px; height: 14px; fill: currentColor; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo">Daily Digest</span>
    <div class="header-right">
      <select class="date-select" id="dateSelect">
        <option value="">Loading...</option>
      </select>
      <button class="icon-btn" onclick="openConfig()" title="Settings">
        <svg viewBox="0 0 16 16"><path d="M8 10a2 2 0 100-4 2 2 0 000 4zm0-6a4 4 0 110 8A4 4 0 018 4zm0-3a1 1 0 011 1v.5a5.5 5.5 0 012.83 1.17l.35-.35a1 1 0 111.41 1.41l-.35.35A5.5 5.5 0 0114 7.5H14.5a1 1 0 010 2H14a5.5 5.5 0 01-1.17 2.83l.35.35a1 1 0 11-1.41 1.41l-.35-.35A5.5 5.5 0 018.5 15v.5a1 1 0 01-2 0V15a5.5 5.5 0 01-2.83-1.17l-.35.35a1 1 0 11-1.41-1.41l.35-.35A5.5 5.5 0 012 8.5H1.5a1 1 0 010-2H2a5.5 5.5 0 011.17-2.83l-.35-.35A1 1 0 014.23 1.9l.35.35A5.5 5.5 0 017.5 1.04V.5a1 1 0 011-1z"/></svg>
      </button>
    </div>
  </div>
  <div class="player-bar" id="playerBar">
    <button class="player-btn" id="playPauseBtn" onclick="togglePlay()">
      <svg id="playIcon" viewBox="0 0 16 16"><path d="M4 2l10 6-10 6V2z"/></svg>
    </button>
    <div class="player-info">
      <div class="player-section" id="playerSection">Ready to play</div>
      <div class="player-progress"><div class="player-progress-fill" id="progressFill"></div></div>
    </div>
    <button class="speed-btn" onclick="cycleSpeed()">
      <span id="speedLabel">1×</span>
    </button>
    <button class="icon-btn" onclick="stopSpeech()" title="Stop">
      <svg viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2"/></svg>
    </button>
  </div>
</header>

<main id="main">
  <div class="state-box">
    <span class="icon">◎</span>
    Open settings to connect your GitHub repo
  </div>
</main>

<!-- Config Modal -->
<div class="modal-overlay" id="configModal">
  <div class="modal">
    <h2>Connect your repo</h2>
    <p class="modal-hint">
      Enter your GitHub details to load digests directly from your repo.
      Your digests should be in the <code>digests/</code> folder as
      <code>digest_YYYY-MM-DD.md</code> files.
    </p>
    <div class="form-group">
      <label class="form-label">GitHub Username</label>
      <input class="form-input" id="cfgUser" placeholder="Pragati-Sharma-29" />
    </div>
    <div class="form-group">
      <label class="form-label">Repository Name</label>
      <input class="form-input" id="cfgRepo" placeholder="daily-digest-agent" />
    </div>
    <div class="form-group">
      <label class="form-label">Branch</label>
      <input class="form-input" id="cfgBranch" placeholder="main" />
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeConfig()">Cancel</button>
      <button class="btn btn-primary" onclick="saveConfig()">Connect</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
// ── Config ──────────────────────────────────────────────────────────────────
const CONFIG_KEY = 'digest_config';

function getConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)) || {}; }
  catch { return {}; }
}

function saveConfig() {
  const cfg = {
    user:   document.getElementById('cfgUser').value.trim(),
    repo:   document.getElementById('cfgRepo').value.trim(),
    branch: document.getElementById('cfgBranch').value.trim() || 'main',
  };
  if (!cfg.user || !cfg.repo) return alert('Please fill in username and repo.');
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
  closeConfig();
  init();
}

function openConfig() {
  const cfg = getConfig();
  document.getElementById('cfgUser').value   = cfg.user   || '';
  document.getElementById('cfgRepo').value   = cfg.repo   || '';
  document.getElementById('cfgBranch').value = cfg.branch || 'main';
  document.getElementById('configModal').classList.add('open');
}

function closeConfig() {
  document.getElementById('configModal').classList.remove('open');
}

// ── GitHub API ───────────────────────────────────────────────────────────────
async function fetchDigestList(cfg) {
  const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/digests?ref=${cfg.branch}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
  const files = await res.json();
  return files
    .filter(f => f.name.endsWith('.md'))
    .map(f => f.name.replace('digest_','').replace('.md',''))
    .sort()
    .reverse();
}

async function fetchDigestContent(cfg, date) {
  const url = `https://raw.githubusercontent.com/${cfg.user}/${cfg.repo}/${cfg.branch}/digests/digest_${date}.md`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Could not load digest for ${date}`);
  return res.text();
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderDigest(markdown) {
  const main = document.getElementById('main');

  // Split into sections by ##
  const lines = markdown.split('\n');
  let title = '';
  let sections = [];
  let currentSection = null;
  let topStoryContent = '';

  for (const line of lines) {
    if (line.startsWith('# ')) {
      title = line.replace('# ','');
    } else if (line.startsWith('## ')) {
      if (currentSection) sections.push(currentSection);
      const sectionTitle = line.replace('## ','');
      currentSection = { title: sectionTitle, bullets: [], isTopStory: sectionTitle.toLowerCase().includes('top story') };
    } else if (line.startsWith('- ') && currentSection) {
      currentSection.bullets.push(line.replace(/^- /,''));
    } else if (currentSection && currentSection.isTopStory && line.trim()) {
      topStoryContent += line + ' ';
    }
  }
  if (currentSection) sections.push(currentSection);

  // Build HTML
  let html = `
    <div class="digest-header">
      <div class="digest-date">${new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'})}</div>
      <h1 class="digest-title">${title || 'Daily Tech Digest'}</h1>
      <button class="listen-all-btn" onclick="listenAll()">
        <svg viewBox="0 0 16 16"><path d="M4 2l10 6-10 6V2z"/></svg>
        Listen to full digest
      </button>
    </div>
  `;

  // Collect all speech segments
  window.speechSegments = [];

  for (const section of sections) {
    if (section.isTopStory) {
      html += `
        <div class="top-story section">
          <div class="top-story-label">⭐ Top Story</div>
          <div class="top-story-text">${linkify(topStoryContent.trim())}</div>
        </div>
      `;
      window.speechSegments.push({ title: 'Top Story', text: topStoryContent.trim() });
    } else {
      const bulletTexts = section.bullets.map(b => stripLinks(b));
      window.speechSegments.push({ title: section.title, text: bulletTexts.join('. ') });

      html += `
        <div class="section">
          <div class="section-header">
            <h2 class="section-title">${section.title}</h2>
            <button class="section-listen" onclick="listenSection(${sections.indexOf(section)})">
              <svg viewBox="0 0 16 16"><path d="M4 2l10 6-10 6V2z"/></svg>
              listen
            </button>
          </div>
          <ul class="bullets">
            ${section.bullets.map(b => `
              <li class="bullet">
                <span class="bullet-dot">▸</span>
                <span>${linkify(b)}</span>
              </li>
            `).join('')}
          </ul>
        </div>
      `;
    }
  }

  main.innerHTML = html;
}

function linkify(text) {
  // Convert ([Source](url)) to clickable links
  return text.replace(/\(\[([^\]]+)\]\(([^)]+)\)\)/g,
    '<a href="$2" target="_blank" rel="noopener">[$1]</a>');
}

function stripLinks(text) {
  return text.replace(/\(\[([^\]]+)\]\(([^)]+)\)\)/g, '').replace(/\[([^\]]+)\]\([^)]+\)/g, '$1').trim();
}

// ── Speech ───────────────────────────────────────────────────────────────────
let speaking = false;
let currentSegmentIdx = 0;
let speechRate = 1;
const speeds = [0.8, 1, 1.2, 1.5, 1.8];
let speedIdx = 1;

function showPlayer() {
  document.getElementById('playerBar').classList.add('visible');
}

function updatePlayerUI(sectionTitle, progress) {
  document.getElementById('playerSection').textContent = sectionTitle;
  document.getElementById('progressFill').style.width = progress + '%';
}

function setPlayIcon(isPlaying) {
  const btn = document.getElementById('playPauseBtn');
  btn.classList.toggle('playing', isPlaying);
  document.getElementById('playIcon').setAttribute('d',
    isPlaying ? 'M4 2h2v12H4zM10 2h2v12h-2z' : 'M4 2l10 6-10 6V2z'
  );
}

function listenAll() {
  currentSegmentIdx = 0;
  showPlayer();
  playSegment(0);
}

function listenSection(idx) {
  currentSegmentIdx = idx;
  showPlayer();
  playSegment(idx);
}

function playSegment(idx) {
  const segs = window.speechSegments || [];
  if (idx >= segs.length) {
    stopSpeech();
    return;
  }

  window.speechSynthesis.cancel();
  const seg = segs[idx];
  const text = `${seg.title}. ${seg.text}`;
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = speechRate;
  utter.lang = 'en-US';

  const progress = Math.round(((idx + 1) / segs.length) * 100);
  updatePlayerUI(seg.title, progress);
  setPlayIcon(true);
  speaking = true;

  utter.onend = () => {
    currentSegmentIdx = idx + 1;
    playSegment(currentSegmentIdx);
  };

  utter.onerror = () => stopSpeech();
  window.speechSynthesis.speak(utter);
}

function togglePlay() {
  if (!window.speechSegments || !window.speechSegments.length) return;
  if (speaking && !window.speechSynthesis.paused) {
    window.speechSynthesis.pause();
    setPlayIcon(false);
    speaking = false;
  } else if (window.speechSynthesis.paused) {
    window.speechSynthesis.resume();
    setPlayIcon(true);
    speaking = true;
  } else {
    playSegment(currentSegmentIdx);
  }
}

function stopSpeech() {
  window.speechSynthesis.cancel();
  speaking = false;
  setPlayIcon(false);
  updatePlayerUI('Stopped', 0);
}

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  speechRate = speeds[speedIdx];
  document.getElementById('speedLabel').textContent = speechRate + '×';
  if (speaking) {
    window.speechSynthesis.cancel();
    playSegment(currentSegmentIdx);
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function loadDigest(date) {
  const cfg = getConfig();
  const main = document.getElementById('main');
  main.innerHTML = '<div class="state-box"><span class="icon">◎</span>Loading digest...</div>';
  try {
    const md = await fetchDigestContent(cfg, date);
    renderDigest(md);
  } catch (e) {
    main.innerHTML = `<div class="state-box"><span class="icon">!</span>Could not load digest for ${date}<br><small>${e.message}</small></div>`;
  }
}

async function init() {
  const cfg = getConfig();
  const main = document.getElementById('main');
  const sel = document.getElementById('dateSelect');

  if (!cfg.user || !cfg.repo) {
    openConfig();
    return;
  }

  main.innerHTML = '<div class="state-box"><span class="icon">◎</span>Fetching digests...</div>';

  try {
    const dates = await fetchDigestList(cfg);
    if (!dates.length) {
      main.innerHTML = '<div class="state-box"><span class="icon">!</span>No digests found in repo yet.</div>';
      return;
    }

    sel.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
    sel.onchange = () => loadDigest(sel.value);
    loadDigest(dates[0]);
  } catch (e) {
    main.innerHTML = `<div class="state-box"><span class="icon">!</span>Could not connect to GitHub<br><small>${e.message}</small></div>`;
    openConfig();
  }
}

// Close modal on backdrop click
document.getElementById('configModal').addEventListener('click', function(e) {
  if (e.target === this) closeConfig();
});

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

init();
</script>
</body>
</html>
